function getPlanetForLevel(level) {
  return PLANETS[Math.floor((Math.max(level, 1) - 1) / 20) % PLANETS.length];
}

function getDifficultyLabel(level, lang) {
  if (level <= 10) return tr("difficultyEasy", lang);

  if (level <= 50) return tr("difficultyHard", lang);
  if (level <= 75) return tr("difficultyIntense", lang);
  return tr("difficultyExtreme", lang);
}

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}
function playTone({ freq=440, type="sine", duration=0.12, gain=0.18 }={}) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const vol = ctx.createGain();
    osc.connect(vol); vol.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    vol.gain.setValueAtTime(gain, ctx.currentTime);
    vol.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playSeq(notes) {
  notes.forEach(n => setTimeout(() => playTone(n), (n.delay ?? 0) * 1000));
}

// Difficulty ramps gently — uses eased curve (ease-in) so early levels stay easy
function getDifficulty(level) {
  const t = Math.min((level - 1) / 99, 1);
  const e = t * t; // ease-in: slow start, faster ramp at end

  // Speed: flat 3.8 before lvl 25, linear 3.8→6.1 from lvl 25 to 75, flat 6.1 from lvl 75
  let speed;
  if (level < 25)       speed = 3.8;
  else if (level >= 75) speed = 6.1;
  else                  speed = 3.8 + ((level - 25) / 50) * (6.1 - 3.8);

  return {
    speed,
    obsCount: Math.round(4 + e * 6),       // 4 → 10
    spacing:  480 - Math.round(e * 200),   // 480 → 280
    flyRatio: 0.15 + e * 0.35,             // 15% → 50%
    jumpVY:  -23,
    gravity:  1.15,
  };
}

const SMART_PATTERNS = {
  easy: [
    ["ground"],
    ["fly"],
    ["ground","ground"],
    ["fly","ground"],
    ["ground","gap"],
    ["fly","gap"],
  ],
  medium: [
    ["ground","fly"],
    ["fly","ground"],
    ["ground","ground","fly"],
    ["ground","fly","ground"],
    ["fly","gap","ground"],
  ],
  hard: [
    ["ground","fly","ground"],
    ["fly","ground","fly"],
    ["ground","ground","fly","ground"],
    ["ground","fly","gap","ground"],
    ["fly","ground","gap","fly"],
  ],
  rest: [
    ["gap"],
    ["ground","gap"],
    ["fly","gap"],
    ["gap","gap"],
  ],
};

function weightedPick(entries) {
  const total = entries.reduce((sum, [, weight]) => sum + weight, 0);
  let r = Math.random() * total;
  for (const [value, weight] of entries) {
    r -= weight;
    if (r <= 0) return value;
  }
  return entries[entries.length - 1][0];
}

function getPatternWeights(level) {
  if (level <= 10) return { easy: 0.72, medium: 0.18, hard: 0.00, rest: 0.10 };
  if (level <= 25) return { easy: 0.54, medium: 0.30, hard: 0.04, rest: 0.12 };
  if (level <= 50) return { easy: 0.28, medium: 0.46, hard: 0.14, rest: 0.12 };
  if (level <= 75) return { easy: 0.16, medium: 0.46, hard: 0.28, rest: 0.10 };
  return { easy: 0.08, medium: 0.40, hard: 0.42, rest: 0.10 };
}

function getPlanetBias(level) {
  const idx = Math.floor((Math.max(1, level) - 1) / 20);
  switch (idx) {
    case 0: return { moreGround: 0.18, moreFly: 0.00 };
    case 1: return { moreGround: 0.05, moreFly: 0.08 };
    case 2: return { moreGround: 0.00, moreFly: 0.14 };
    case 3: return { moreGround: 0.12, moreFly: 0.00 };
    default:return { moreGround: 0.06, moreFly: 0.10 };
  }
}

function choosePatternCategory(level) {
  const w = getPatternWeights(level);
  return weightedPick([
    ["easy", w.easy],
    ["medium", w.medium],
    ["hard", w.hard],
    ["rest", w.rest],
  ]);
}

function isPatternAllowed(pattern, ctx) {
  const obstacleCount = pattern.filter(p => p !== "gap").length;
  if (ctx.lastKey === pattern.join("-")) return false;
  if (ctx.remaining <= 0 && obstacleCount > 0) return false;

  const maxActions = ctx.level < 25 ? 2 : ctx.level < 55 ? 3 : 4;
  let consecutive = 0;
  for (const step of pattern) {
    if (step === "gap") {
      consecutive = 0;
    } else {
      consecutive += 1;
      if (consecutive > maxActions) return false;
    }
  }

  if (ctx.level < 18 && pattern.includes("fly") && pattern.includes("ground") && obstacleCount >= 3) return false;
  if (ctx.remaining <= 2 && obstacleCount > ctx.remaining) return false;
  if (ctx.recentKeys.includes(pattern.join("-"))) return false;

  return true;
}

function buildSmartObstaclePlan(level, diff) {
  const plan = [];
  const recentKeys = [];
  const bias = getPlanetBias(level);
  const target = diff.obsCount;

  while (plan.filter(p => p !== "gap").length < target) {
    let selected = null;

    for (let tries = 0; tries < 14; tries++) {
      const category = choosePatternCategory(level);
      const pool = SMART_PATTERNS[category];
      const pattern = pool[Math.floor(Math.random() * pool.length)];
      const ctx = {
        level,
        lastKey: recentKeys[recentKeys.length - 1] || "",
        recentKeys: recentKeys.slice(-3),
        remaining: target - plan.filter(p => p !== "gap").length,
      };
      if (!isPatternAllowed(pattern, ctx)) continue;
      selected = pattern;
      recentKeys.push(pattern.join("-"));
      break;
    }

    if (!selected) selected = ["ground"];

    selected.forEach(step => {
      if (plan.filter(p => p !== "gap").length >= target && step !== "gap") return;
      if (step === "ground" && Math.random() < bias.moreFly) {
        plan.push("fly");
      } else if (step === "fly" && Math.random() < bias.moreGround) {
        plan.push("ground");
      } else {
        plan.push(step);
      }
    });

    if (level < 30 && Math.random() < 0.18) plan.push("gap");
    if (level > 70 && Math.random() < 0.10) plan.push("ground");
  }

  return plan;
}

function rr(ctx, x, y, w, h, r) {
  const rad = Math.max(0, Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2));
  ctx.beginPath();
  ctx.moveTo(x + rad, y);
  ctx.lineTo(x + w - rad, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rad);
  ctx.lineTo(x + w, y + h - rad);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
  ctx.lineTo(x + rad, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rad);
  ctx.lineTo(x, y + rad);
  ctx.quadraticCurveTo(x, y, x + rad, y);
  ctx.closePath();
}

function drawHeroCanvas(ctx, x, feet, charObj, state, tick=0) {
  const dark = "#1E2430";
  const skin = "#FFE0BD";
  const bounce = !state.airborne && !state.ducking ? Math.sin(tick / 140) * 1.5 : 0;
  const bodyColor = charObj.color;
  const headW = charObj.key === "robot" ? 28 : 30;
  const headH = charObj.key === "robot" ? 28 : 30;
  const headX = x;
  let headY = feet - 74 + bounce;
  let bodyY = feet - 48 + bounce;

  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  if (state.crashed) {
    ctx.font = "48px serif";
    ctx.fillText("💥", x - 22, feet - 10);
    ctx.restore();
    return;
  }

  if (state.ducking) {
    headY = feet - 34;
    bodyY = feet - 24;
    ctx.strokeStyle = dark;
    ctx.lineWidth = 6;
    ctx.fillStyle = bodyColor;
    rr(ctx, x - 24, bodyY - 8, 42, 16, 8); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x - 4, bodyY + 2); ctx.lineTo(x - 22, bodyY + 6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 8, bodyY + 2); ctx.lineTo(x + 24, bodyY - 10); ctx.stroke();
  } else {
    const swing = state.airborne ? 8 : (state.frame === 0 ? 12 : -12);
    ctx.strokeStyle = dark;
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(x - 7, bodyY + 24); ctx.lineTo(x - 10 - swing * 0.4, feet - 14); ctx.lineTo(x - 6 - swing * 0.8, feet); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 7, bodyY + 24); ctx.lineTo(x + 10 + swing * 0.4, feet - 14); ctx.lineTo(x + 6 + swing * 0.8, feet); ctx.stroke();
    ctx.fillStyle = bodyColor;
    ctx.strokeStyle = dark;
    ctx.lineWidth = 6;
    rr(ctx, x - 14, bodyY, 28, 24, 10); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x - 11, bodyY + 7); ctx.lineTo(x - 20 + swing * 0.45, bodyY + 18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 11, bodyY + 7); ctx.lineTo(x + 20 - swing * 0.45, bodyY + 18); ctx.stroke();
  }

  // head
  ctx.fillStyle = charObj.key === "robot"
    ? "#DDE5EA"
    : skin;
  ctx.strokeStyle = dark;
  ctx.lineWidth = 5;
  ctx.beginPath();
  if (charObj.key === "robot") ctx.roundRect(headX - headW/2, headY - headH/2, headW, headH, 7);
  else ctx.roundRect(headX - headW/2, headY - headH/2, headW, headH, 12);
  ctx.fill(); ctx.stroke();

  // eyes
  if (charObj.key === "robot") {
    ctx.fillStyle = "#7FDBFF";
    rr(ctx, headX - 10, headY - 4, 20, 8, 4); ctx.fill();
  } else {
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(headX - 6, headY - 2, 2.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(headX + 6, headY - 2, 2.3, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.65;
    ctx.fillRect(headX - 4, headY + 6, 8, 2);
    ctx.globalAlpha = 1;
  }

  // accessories
  ctx.strokeStyle = dark;
  ctx.fillStyle = charObj.accent || "#fff";
  if (charObj.key === "astro") {
    ctx.beginPath(); ctx.arc(headX, headY, 20, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "rgba(120,210,255,.28)";
    rr(ctx, headX - 12, headY - 9, 24, 12, 6); ctx.fill();
  } else if (charObj.key === "elf") {
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.moveTo(headX - 14, headY - 2); ctx.lineTo(headX - 22, headY - 7); ctx.lineTo(headX - 16, headY + 4); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(headX + 14, headY - 2); ctx.lineTo(headX + 22, headY - 7); ctx.lineTo(headX + 16, headY + 4); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = charObj.accent;
    rr(ctx, headX - 12, headY - 18, 24, 6, 3); ctx.fill(); ctx.stroke();
  } else if (charObj.key === "uni") {
    ctx.fillStyle = charObj.accent;
    ctx.beginPath(); ctx.moveTo(headX - 10, headY - 12); ctx.lineTo(headX - 4, headY - 22); ctx.lineTo(headX - 1, headY - 12); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(headX + 10, headY - 12); ctx.lineTo(headX + 4, headY - 22); ctx.lineTo(headX + 1, headY - 12); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#FFD54F";
    ctx.beginPath(); ctx.moveTo(headX, headY - 24); ctx.lineTo(headX + 5, headY - 10); ctx.lineTo(headX - 3, headY - 10); ctx.closePath(); ctx.fill();
  } else if (charObj.key === "frog") {
    ctx.fillStyle = bodyColor;
    ctx.beginPath(); ctx.arc(headX - 8, headY - 15, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(headX + 8, headY - 15, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  } else if (charObj.key === "robot") {
    ctx.beginPath(); ctx.moveTo(headX, headY - 18); ctx.lineTo(headX, headY - 25); ctx.stroke();
    ctx.fillStyle = "#FF5252";
    ctx.beginPath(); ctx.arc(headX, headY - 28, 3.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  } else if (charObj.key === "fox") {
    ctx.fillStyle = bodyColor;
    ctx.beginPath(); ctx.moveTo(headX - 13, headY - 8); ctx.lineTo(headX - 6, headY - 23); ctx.lineTo(headX - 1, headY - 9); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(headX + 13, headY - 8); ctx.lineTo(headX + 6, headY - 23); ctx.lineTo(headX + 1, headY - 9); ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (charObj.key === "octo") {
    ctx.fillStyle = bodyColor;
    ctx.beginPath(); ctx.arc(headX, headY - 3, 17, Math.PI, 0); ctx.fill(); ctx.stroke();
  } else if (charObj.key === "bolt") {
    ctx.fillStyle = charObj.accent;
    ctx.beginPath(); ctx.moveTo(headX - 1, headY - 25); ctx.lineTo(headX + 7, headY - 12); ctx.lineTo(headX + 1, headY - 12); ctx.lineTo(headX + 8, headY); ctx.lineTo(headX - 4, headY - 10); ctx.lineTo(headX + 1, headY - 10); ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // fallback highlight to guarantee visibility even if some accessory drawing fails
  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,0.08)";
  ctx.beginPath();
  ctx.arc(x, feet - 28, 24, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

function drawObstacleCanvas(ctx, o, tick=0) {
  const isFly = o.type === "fly";
  const x = o.x;
  const y = isFly ? (GROUND_Y - 84) + Math.sin(tick/220 + (o.bobPhase||0)) * 1.5 : (GROUND_Y - 4);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(isFly ? Math.sin(tick/260 + (o.bobPhase||0)) * 0.08 : 0);

  if (isFly) {
    const c1 = ["#80D8FF","#82B1FF","#B388FF","#7C4DFF"][o.skin % 4];
    const c2 = ["#E1F5FE","#C5CAE9","#EDE7F6","#D1C4E9"][o.skin % 4];
    ctx.fillStyle = c1;
    ctx.strokeStyle = "#243447";
    ctx.lineWidth = 4;
    if (o.skin % 4 === 0) {
      ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = c2; ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-26, 0); ctx.lineTo(-14, 0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(26, 0); ctx.lineTo(14, 0); ctx.stroke();
    } else if (o.skin % 4 === 1) {
      rr(ctx, -18, -12, 36, 24, 9); ctx.fill(); ctx.stroke();
      ctx.fillStyle = c2; ctx.fillRect(-10, -4, 20, 8);
      ctx.beginPath(); ctx.moveTo(-10, 14); ctx.lineTo(-20, 22); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(10, 14); ctx.lineTo(20, 22); ctx.stroke();
    } else if (o.skin % 4 === 2) {
      ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(18,0); ctx.lineTo(0,18); ctx.lineTo(-18,0); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = c2; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-18,-10); ctx.lineTo(0,-22); ctx.lineTo(18,-10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-18,10); ctx.lineTo(0,22); ctx.lineTo(18,10); ctx.stroke();
    }
  } else {
    const c1 = ["#FF8A65","#FF7043","#FFB74D","#EF5350"][o.skin % 4];
    const c2 = ["#FFE0B2","#FFCCBC","#FFF3E0","#FFCDD2"][o.skin % 4];
    ctx.fillStyle = c1;
    ctx.strokeStyle = "#3B2A24";
    ctx.lineWidth = 4;
    if (o.skin % 4 === 0) {
      ctx.beginPath(); ctx.moveTo(-18,14); ctx.lineTo(-10,-14); ctx.lineTo(0,8); ctx.lineTo(10,-18); ctx.lineTo(18,14); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = c2; ctx.fillRect(-3,-2,6,8);
    } else if (o.skin % 4 === 1) {
      rr(ctx, -17,-12,34,26,10); ctx.fill(); ctx.stroke();
      ctx.fillStyle = c2; ctx.fillRect(-10,-4,20,8);
    } else if (o.skin % 4 === 2) {
      ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = c2; ctx.beginPath(); ctx.arc(-4,-4,5,0,Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.moveTo(-18,14); ctx.lineTo(-12,-12); ctx.lineTo(-4,14); ctx.lineTo(2,-10); ctx.lineTo(10,14); ctx.lineTo(16,-8); ctx.lineTo(18,14); ctx.closePath(); ctx.fill(); ctx.stroke();
    }
  }
  ctx.restore();
}

function Runner({ planet, charObj, level, onFinish, sfx = ()=>{}, hap = ()=>{}, lang="fr", isLandscapeMobile=false, vp={w:900,h:600} }) {
  const diff = getDifficulty(level);
  const landscape = isLandscapeMobile;

  const canvasRef = useRef(null);
  const doneFired = useRef(false);
  const rafRef = useRef(null);

  const FEET_Y_BASE = GROUND_Y + 2;

  function makeLevelObstacles() {
    const { spacing, flyRatio } = diff;
    const plan = buildSmartObstaclePlan(level, diff);
    const obs = [];
    let x = 560;
    let id = 0;

    for (let i = 0; i < plan.length; i++) {
      const step = plan[i];
      if (step === "gap") {
        const gapBoost = level < 30 ? 1.38 : level < 70 ? 1.24 : 1.14;
        x += spacing * gapBoost;
        continue;
      }

      const fly = step === "fly" ? true : (step === "ground" ? false : Math.random() < flyRatio);
      const hitbox = fly
        ? { xOffset: -18, width: 36, y: FEET_Y_BASE - 98, height: 24 }
        : { xOffset: -14, width: 28, y: FEET_Y_BASE - 14, height: 14 };

      obs.push({
        id: id++,
        x,
        type: fly ? "fly" : "ground",
        bobPhase: Math.random() * Math.PI * 2,
        spinSeed: Math.random() * 0.8 + 0.6,
        hitbox,
        skin: Math.floor(Math.random() * 4),
      });

      const next = plan[i + 1];
      const sameType = next && next !== "gap" && next === step;
      const alternation = next && next !== "gap" && next !== step;
      let localSpacing = spacing + randN(-16, 18);
      if (sameType) localSpacing *= level < 40 ? 1.12 : 1.02;
      if (alternation) localSpacing *= level < 40 ? 1.10 : 1.02;
      if (i < 2) localSpacing *= 1.10;
      x += Math.max(246, localSpacing);
    }
    return obs;
  }

  const S = useRef({
    feetY: FEET_Y_BASE,
    vy: 0,
    onGround: true,
    ducking: false,
    obstacles: null,
    progress: 0,
    done: false,
    crashed: false,
    crashTimer: 0,
  });

  if (!S.current.obstacles) S.current.obstacles = makeLevelObstacles();

  const startDuck = useCallback(() => {
    const s = S.current;
    if (!s.done && !s.crashed && s.onGround && !s.ducking) {
      s.ducking = true;
      sfx("duck");
      hap("duck");
    }
  }, [sfx, hap]);

  const endDuck = useCallback(() => {
    S.current.ducking = false;
  }, []);

  const jump = useCallback(() => {
    const s = S.current;
    if (s.onGround && !s.done && !s.crashed && !s.ducking) {
      s.vy = -17.2;
      s.onGround = false;
      sfx("jump");
      hap("jump");
    }
  }, [diff.jumpVY, sfx, hap]);

  useEffect(() => {
    const kd = (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); jump(); }
      if (e.code === "ArrowDown" || e.code === "ShiftLeft") { e.preventDefault(); startDuck(); }
    };
    const ku = (e) => {
      if (e.code === "ArrowDown" || e.code === "ShiftLeft") endDuck();
    };
    window.addEventListener("keydown", kd);
    window.addEventListener("keyup", ku);
    return () => {
      window.removeEventListener("keydown", kd);
      window.removeEventListener("keyup", ku);
    };
  }, [jump, startDuck, endDuck]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");

    function drawShadow(cx, rx, ry, alpha=0.18) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(cx, FEET_Y_BASE + 14, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawHead(cx, cy, r, forward = 0) {
      const heroDark = "#2B2F3A";
      const heroBody = charObj.color || "#4FC3F7";
      const heroAccent = charObj.accent || "#ffffff";
      const skin = "#FFE6C9";

      ctx.fillStyle = skin;
      ctx.strokeStyle = heroDark;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = heroDark;
      ctx.beginPath(); ctx.arc(cx - 3 + forward * 0.8, cy - 1, 1.9, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 3 + forward * 0.8, cy - 1, 1.9, 0, Math.PI * 2); ctx.fill();
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.arc(cx + forward * 1.8, cy + 2.2, 2.9, 0.2, Math.PI - 0.2);
      ctx.stroke();

      ctx.fillStyle = heroAccent;
      ctx.strokeStyle = heroDark;
      ctx.lineWidth = 2.2;
      if (charObj.key === "astro") {
        ctx.beginPath(); ctx.arc(cx, cy, r + 3, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = "rgba(140,220,255,.22)";
        ctx.beginPath(); ctx.roundRect(cx - 8, cy - 6, 16, 8, 4); ctx.fill();
      } else if (charObj.key === "elf") {
        ctx.fillStyle = skin;
        ctx.beginPath(); ctx.moveTo(cx - 10, cy - 1); ctx.lineTo(cx - 18, cy - 6); ctx.lineTo(cx - 12, cy + 3); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 10, cy - 1); ctx.lineTo(cx + 18, cy - 6); ctx.lineTo(cx + 12, cy + 3); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = heroAccent;
        ctx.beginPath(); ctx.roundRect(cx - 10, cy - r - 2, 20, 5, 3); ctx.fill(); ctx.stroke();
      } else if (charObj.key === "uni") {
        ctx.fillStyle = heroAccent;
        ctx.beginPath(); ctx.moveTo(cx - 8, cy - 6); ctx.lineTo(cx - 3, cy - 14); ctx.lineTo(cx, cy - 6); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 8, cy - 6); ctx.lineTo(cx + 3, cy - 14); ctx.lineTo(cx, cy - 6); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#FFD54F";
        ctx.beginPath(); ctx.moveTo(cx, cy - r - 5); ctx.lineTo(cx + 4, cy - 6); ctx.lineTo(cx - 2, cy - 6); ctx.closePath(); ctx.fill();
      } else if (charObj.key === "frog") {
        ctx.fillStyle = heroBody;
        ctx.beginPath(); ctx.arc(cx - 5, cy - r * 0.78, 3.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 5, cy - r * 0.78, 3.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      } else if (charObj.key === "robot") {
        ctx.fillStyle = "#DDE5EA";
        ctx.lineWidth = 3.2;
        ctx.beginPath(); ctx.roundRect(cx - 10, cy - 10, 20, 20, 5); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#7FDBFF";
        ctx.beginPath(); ctx.roundRect(cx - 6, cy - 2, 12, 5, 3); ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx, cy - 10); ctx.lineTo(cx, cy - 16); ctx.stroke();
        ctx.fillStyle = "#FF5252";
        ctx.beginPath(); ctx.arc(cx, cy - 18, 2.5, 0, Math.PI * 2); ctx.fill();
      } else if (charObj.key === "fox") {
        ctx.fillStyle = heroBody;
        ctx.beginPath(); ctx.moveTo(cx - 7, cy - 5); ctx.lineTo(cx - 3, cy - 13); ctx.lineTo(cx, cy - 5); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 7, cy - 5); ctx.lineTo(cx + 3, cy - 13); ctx.lineTo(cx, cy - 5); ctx.closePath(); ctx.fill(); ctx.stroke();
      } else if (charObj.key === "octo") {
        ctx.fillStyle = heroBody;
        ctx.beginPath(); ctx.arc(cx, cy - 1, r + 1, Math.PI, 0); ctx.fill(); ctx.stroke();
        for (let i = -2; i <= 1; i++) {
          ctx.beginPath();
          ctx.moveTo(cx - 6 + i * 4, cy + 6);
          ctx.lineTo(cx - 6 + i * 4, cy + 10);
          ctx.stroke();
        }
      } else if (charObj.key === "bolt") {
        ctx.fillStyle = heroAccent;
        ctx.beginPath();
        ctx.moveTo(cx - 1, cy - r - 6);
        ctx.lineTo(cx + 6, cy - 4);
        ctx.lineTo(cx + 1, cy - 4);
        ctx.lineTo(cx + 7, cy + 6);
        ctx.lineTo(cx - 4, cy - 2);
        ctx.lineTo(cx + 1, cy - 2);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
    }

    function drawTorso(cx, cy, w, h) {
      const heroDark = "#2B2F3A";
      const heroBody = charObj.color || "#4FC3F7";
      ctx.fillStyle = heroBody;
      ctx.strokeStyle = heroDark;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.roundRect(cx - w / 2, cy - h / 2, w, h, 10);
      ctx.fill();
      ctx.stroke();
    }

    function drawHero(s, tNow) {
      const heroX = CHAR_X;
      const heroDark = "#2B2F3A";
      const airborne = !s.onGround;
      const stride = airborne ? 0 : Math.sin(tNow / 105) * 6;

      ctx.save();
      ctx.strokeStyle = heroDark;
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (s.crashed) {
        ctx.font = "48px serif";
        ctx.fillText("💥", heroX - 22, s.feetY - 20);
        ctx.restore();
        return;
      }

      if (s.ducking) {
        // New crouch: built entirely from a feet anchor. Feet stay on the floor.
        const feetY = FEET_Y_BASE;

        const backFoot = { x: heroX - 18, y: feetY };
        const frontFoot = { x: heroX + 8, y: feetY };

        const backKnee = { x: heroX - 14, y: feetY - 7 };
        const frontKnee = { x: heroX + 12, y: feetY - 9 };

        const backHip = { x: heroX - 4, y: feetY - 19 };
        const frontHip = { x: heroX + 8, y: feetY - 19 };

        const torso = { x: heroX + 8, y: feetY - 29 };
        const neck = { x: heroX + 18, y: feetY - 35 };
        const head = { x: heroX + 24, y: feetY - 43 };

        const rearHand = { x: heroX + 2, y: feetY - 24 };
        const frontHand = { x: heroX + 22, y: feetY - 22 };

        drawShadow(heroX + 2, 24, 6, 0.2);

        // feet
        ctx.beginPath(); ctx.moveTo(backFoot.x - 6, backFoot.y); ctx.lineTo(backFoot.x + 6, backFoot.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(frontFoot.x - 6, frontFoot.y); ctx.lineTo(frontFoot.x + 6, frontFoot.y); ctx.stroke();

        // lower legs
        ctx.beginPath(); ctx.moveTo(backFoot.x, backFoot.y); ctx.lineTo(backKnee.x, backKnee.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(frontFoot.x, frontFoot.y); ctx.lineTo(frontKnee.x, frontKnee.y); ctx.stroke();

        // upper legs
        ctx.beginPath(); ctx.moveTo(backKnee.x, backKnee.y); ctx.lineTo(backHip.x, backHip.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(frontKnee.x, frontKnee.y); ctx.lineTo(frontHip.x, frontHip.y); ctx.stroke();

        // torso
        drawTorso(torso.x, torso.y, 32, 12);

        // spine + neck forward
        ctx.beginPath(); ctx.moveTo(heroX + 2, feetY - 29); ctx.lineTo(neck.x, neck.y); ctx.stroke();

        // arms
        ctx.beginPath(); ctx.moveTo(heroX + 4, feetY - 31); ctx.lineTo(rearHand.x, rearHand.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(heroX + 12, feetY - 30); ctx.lineTo(frontHand.x, frontHand.y); ctx.stroke();

        // head clearly lower than standing, but still above torso
        drawHead(head.x, head.y, 9, 1);
      } else {
        // standing / running / jumping skeleton, also feet-anchored
        const feetY = s.feetY;
        const leftFoot = { x: heroX - 8 - stride * 0.7, y: feetY };
        const rightFoot = { x: heroX + 8 + stride * 0.7, y: feetY };
        const leftKnee = { x: heroX - 10 - stride * 0.35, y: feetY - 8 };
        const rightKnee = { x: heroX + 10 + stride * 0.35, y: feetY - 8 };
        const pelvis = { x: heroX, y: feetY - 22 };
        const torso = { x: heroX, y: feetY - 36 };
        const neck = { x: heroX, y: feetY - 48 };
        const head = { x: heroX, y: feetY - 60 };

        drawShadow(heroX, airborne ? 12 : 18, airborne ? 4 : 6, airborne ? 0.12 : 0.18);

        // feet
        ctx.beginPath(); ctx.moveTo(leftFoot.x - 4, leftFoot.y); ctx.lineTo(leftFoot.x + 4, leftFoot.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rightFoot.x - 4, rightFoot.y); ctx.lineTo(rightFoot.x + 4, rightFoot.y); ctx.stroke();

        // legs
        ctx.beginPath(); ctx.moveTo(leftFoot.x, leftFoot.y); ctx.lineTo(leftKnee.x, leftKnee.y); ctx.lineTo(pelvis.x - 5, pelvis.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rightFoot.x, rightFoot.y); ctx.lineTo(rightKnee.x, rightKnee.y); ctx.lineTo(pelvis.x + 5, pelvis.y); ctx.stroke();

        // torso
        drawTorso(torso.x, torso.y, 28, 24);

        // spine
        ctx.beginPath(); ctx.moveTo(pelvis.x, pelvis.y); ctx.lineTo(neck.x, neck.y); ctx.stroke();

        // arms
        ctx.beginPath(); ctx.moveTo(heroX - 10, feetY - 40); ctx.lineTo(heroX - 20 + stride * 0.5, feetY - 30); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(heroX + 10, feetY - 40); ctx.lineTo(heroX + 20 - stride * 0.5, feetY - 30); ctx.stroke();

        drawHead(head.x, head.y, 12, 0);
      }

      ctx.restore();
    }

    const tick = () => {
      const s = S.current;

      if (!s.crashed && !s.done) {
        if (!s.ducking) {
          s.vy += 0.72;
          s.feetY += s.vy;
          if (s.feetY < 120) {
            s.feetY = 120;
            if (s.vy < 0) s.vy = 0;
          }
          if (s.feetY >= FEET_Y_BASE) {
            s.feetY = FEET_Y_BASE;
            s.vy = 0;
            s.onGround = true;
          }
        } else {
          s.feetY = FEET_Y_BASE;
          s.vy = 0;
          s.onGround = true;
        }

        s.obstacles.forEach(o => { o.x -= diff.speed; });

        const passed = s.obstacles.filter(o => o.x < CHAR_X - 40).length;
        s.progress = Math.min(99, Math.round((passed / diff.obsCount) * 95));

        const playerBox = s.ducking
          ? { x: CHAR_X - 22, y: FEET_Y_BASE - 30, width: 58, height: 30 }
          : { x: CHAR_X - 18, y: s.feetY - 72, width: 40, height: 72 };

        s.obstacles.forEach(o => {
          const ox = o.x + o.hitbox.xOffset;
          const oy = o.hitbox.y;
          const horizontalOverlap = playerBox.x < ox + o.hitbox.width &&
            playerBox.x + playerBox.width > ox;

          if (!horizontalOverlap) return;

          if (o.type === "fly") {
            if (!s.ducking) {
              s.crashed = true;
              s.crashTimer = 65;
              sfx("crash");
              hap("crash");
            }
            return;
          }

          const verticalOverlap = playerBox.y < oy + o.hitbox.height &&
            playerBox.y + playerBox.height > oy;

          if (!verticalOverlap) return;

          s.crashed = true;
          s.crashTimer = 65;
          sfx("crash");
          hap("crash");
        });

        if (s.obstacles.every(o => o.x < -60) && !doneFired.current) {
          s.progress = 100;
          s.done = true;
        }
      } else if (s.crashed) {
        s.crashTimer--;
        if (s.crashTimer <= 0) {
          s.crashed = false;
          s.feetY = FEET_Y_BASE;
          s.vy = 0;
          s.onGround = true;
          s.ducking = false;
          s.obstacles = makeLevelObstacles();
          s.progress = 0;
        }
      }

      const W = W_C, H = H_C;
      ctx.clearRect(0, 0, W, H);

      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, planet.bg + "ff");
      sky.addColorStop(1, planet.bg + "cc");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      // finish flag
      ctx.font = "40px serif";
      ctx.fillText("🏁", W - 64, FEET_Y_BASE + 16);

      // ground
      ctx.save();
      ctx.shadowBlur = 16;
      ctx.shadowColor = planet.color;
      ctx.strokeStyle = planet.color;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(0, FEET_Y_BASE);
      ctx.lineTo(W, FEET_Y_BASE);
      ctx.stroke();
      ctx.restore();

      drawHero(s, Date.now());

      s.obstacles.forEach(o => {
        if (o.x < -60 || o.x > W + 30) return;
        drawObstacleCanvas(ctx, o, Date.now());
      });

      ctx.fillStyle = "#ffffff1a";
      ctx.fillRect(16, 12, W - 32, 14);
      ctx.fillStyle = planet.color;
      ctx.fillRect(16, 12, (W - 32) * (s.progress / 100), 14);
      ctx.fillStyle = "#ffffffcc";
      ctx.font = "bold 13px sans-serif";
      ctx.fillText(s.progress + "% 🏁", W - 76, 26);

      if (s.done && !doneFired.current) {
        doneFired.current = true;
        cancelAnimationFrame(rafRef.current);
        setTimeout(onFinish, 350);
        return;
      }
      rafRef.current = requestAnimationFrame(tick);
    };

    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [planet, charObj, onFinish, lang, diff, sfx, hap]);

  const canvasHeight = landscape
    ? Math.max(280, Math.min(vp.h - 120, 420))
    : H_C;

  const btnBase = {
    flex: 1,
    fontSize: landscape ? 30 : 36,
    border: "none",
    borderRadius: 16,
    cursor: "pointer",
    userSelect: "none",
    touchAction: "none",
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
    fontWeight: 900,
    transition: "filter 0.1s",
  };

  return (
    <div style={{ width:"100%", position:"relative" }}>
      <canvas
        ref={canvasRef}
        width={W_C}
        height={H_C}
        style={{
          width:"100%",
          height: landscape ? `${canvasHeight}px` : "auto",
          aspectRatio:`${W_C}/${H_C}`,
          borderRadius: landscape ? 16 : 14,
          display:"block"
        }}
      />

      <div style={{

// ── Question ──────────────────────────────────────────────────────
function Question({ question, planet, onResult, lang="fr" }) {
  const [choices]  = useState(() => makeChoices(question.answer));
  const [picked,   setPicked]  = useState(null);
  const [feedback, setFeedback] = useState(null);

  const pick = (c) => {
    if (picked !== null) return;
    setPicked(c);
    const ok = c === question.answer;
    setFeedback(ok ? "ok" : "ko");
    setTimeout(() => onResult(ok), 950);
  };

  return (
    <div style={{ textAlign:"center", padding:"8px 0" }}>
      <div style={{ fontSize:15, color:"#ffffffaa", marginBottom:6 }}>{tr("questionPrompt", lang)}</div>
      <div style={{
        fontSize:54, fontWeight:900, color:planet.color,
        textShadow:`0 0 24px ${planet.color}88`,
        margin:"4px 0 18px", animation:"pulse 1.2s ease-in-out infinite",
      }}>
        {question.a} x {question.b} = ?
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        {choices.map((c, i) => {
          let bg = "#ffffff14", border = "#ffffff30";
          if (picked !== null) {
            if (c === question.answer)                 { bg="#00C85333"; border="#00C853"; }
            if (c === picked && c !== question.answer) { bg="#FF174433"; border="#FF1744"; }
          }
          return (
            <button key={i} onClick={() => pick(c)} style={{
              padding:"15px 8px", fontSize:26, fontWeight:900,
              background:bg, border:`2px solid ${border}`, borderRadius:14,
              color:"#fff", cursor:"pointer", transition:"all 0.15s",
            }}>
              {c}
            </button>
          );
        })}
      </div>
      {feedback && (
        <div style={{ marginTop:14, animation:"bounceIn 0.3s ease" }}>
          {feedback === "ok" ? (
            <div style={{ fontSize:22, fontWeight:900, color:"#00C853" }}>
              {T.cheers[lang]?.[Math.floor(Math.random()*T.cheers[lang].length)] ?? T.cheers.fr[0]}
            </div>
          ) : (
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:18, fontWeight:900, color:"#FF5252" }}>
                {T.fails[lang]?.[Math.floor(Math.random()*T.fails[lang].length)] ?? T.fails.fr[0]}
              </div>
              <div style={{ marginTop:6, fontSize:20, fontWeight:900, color:"#FFD700", background:"#FFD70022", borderRadius:10, padding:"6px 14px", display:"inline-block" }}>
                {tr("answerWas", lang)} : {question.a} × {question.b} = {question.answer}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

        <div style={{ fontSize:18, color:"#FFD700", margin:"8px 0", fontWeight:700 }}>

      ) : (
        <div style={{ fontSize:15, color:"#ffffff77", margin:"8px 0" }}>
          {tr("noStar", lang)}

// ── Skip Quiz : 2 multiplications pour passer le niveau ──────────
function SkipQuiz({ tables, planet, onDone, lang="fr" }) {
  const initialQuestion = useRef(makeQuestion(tables));
  const [step,      setStep]     = useState(0);       // 0 or 1
  const [q,         setQ]        = useState(initialQuestion.current);
  const [choices,   setChoices]  = useState(() => makeChoices(initialQuestion.current.answer));
  const [results,   setResults]  = useState([]);      // true/false per step
  const [picked,    setPicked]   = useState(null);
  const [feedback,  setFeedback] = useState(null);

  // fresh question when step changes
  useEffect(() => {
    const nq = makeQuestion(tables);
    setQ(nq);
    setChoices(makeChoices(nq.answer));
    setPicked(null);
    setFeedback(null);
  }, [step]);

  const pick = (c) => {
    if (picked !== null) return;
    setPicked(c);
    const ok = c === q.answer;
    setFeedback(ok);
    setTimeout(() => {
      if (!ok) {
        onDone(false); // faux → retour au jeu
      } else if (step < 1) {
        setResults([true]);
        setStep(1);
      } else {
        onDone(true); // les 2 bonnes → niveau passé + étoile
      }
    }, 1100);
  };

  return (
    <div style={{ padding:"8px 0", textAlign:"center" }}>
      <div style={{ fontSize:13, color:"#ffffff77", marginBottom:4 }}>
        {tr("skipQ",lang)} {step + 1} / 2 — {tr("skipHint",lang)}
      </div>
      {/* stepper dots */}
      <div style={{ display:"flex", gap:8, justifyContent:"center", marginBottom:14 }}>
        {[0,1].map(i => (
          <div key={i} style={{
            width:12, height:12, borderRadius:"50%",
            background: i < step ? "#00C853" : i === step ? planet.color : "#ffffff33",
            transition:"background 0.3s",
          }} />
        ))}
      </div>

      <div style={{
        fontSize:50, fontWeight:900, color:planet.color,
        textShadow:`0 0 20px ${planet.color}88`,
        margin:"4px 0 18px", animation:"pulse 1.2s ease-in-out infinite",
      }}>
        {q.a} x {q.b} = ?
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        {choices.map((c, i) => {
          let bg = "#ffffff14", border = "#ffffff30";
          if (picked !== null) {
            if (c === q.answer)                 { bg="#00C85333"; border="#00C853"; }
            if (c === picked && c !== q.answer) { bg="#FF174433"; border="#FF1744"; }
          }
          return (
            <button key={i} onClick={() => pick(c)} style={{
              padding:"14px 8px", fontSize:26, fontWeight:900,
              background:bg, border:`2px solid ${border}`, borderRadius:14,
              color:"#fff", cursor:"pointer", transition:"all 0.15s",
            }}>{c}</button>
          );
        })}
      </div>

      {feedback !== null && (
        <div style={{ marginTop:12, animation:"bounceIn 0.3s ease" }}>
          {feedback ? (
            <div style={{ fontSize:20, fontWeight:900, color:"#00C853" }}>
              {step < 1 ? tr("skipRight1",lang) : ""}
            </div>
          ) : (
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:17, fontWeight:900, color:"#FF5252" }}>{tr("skipWrong",lang)}</div>
              <div style={{ marginTop:6, fontSize:19, fontWeight:900, color:"#FFD700", background:"#FFD70022", borderRadius:10, padding:"5px 12px", display:"inline-block" }}>
                {tr("answerWas",lang)} : {q.a} × {q.b} = {q.answer}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────
const SAVE_KEY = "multiplanet-save";

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function writeSave(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
}

function App() {
  const vp = useViewportSize();
  const isMobile = vp.w <= 900;
  const isPortrait = vp.h >= vp.w;
  const mobileLandscape = isMobile && !isPortrait;
  const mobilePortrait = isMobile && isPortrait;
  const isLandscapeMobile = mobileLandscape;

  useEffect(() => {
    if (isMobile) tryLockLandscape();
  }, [isMobile]);

  useEffect(() => {
    const openShop = () => setShop(true);
    window.addEventListener("open-multiplanet-shop", openShop);
    return () => window.removeEventListener("open-multiplanet-shop", openShop);
  }, []);
  const saved = useRef(loadSave());
  const s0    = saved.current;

  const [screen,        setScreen]       = useState("home");
  const [level,         setLevel]        = useState(s0?.level        ?? 1);
  const [tables,        setTables]       = useState(s0?.tables       ?? [1, 2]);
  const [unlocked,      setUnlocked]     = useState(s0?.unlocked     ?? [1, 2, 3]);
  const [heroIdx,       setHeroIdx]      = useState(s0?.heroIdx      ?? 0);
  const [question,      setQuestion]     = useState(null);
  const [correct,       setCorrect]      = useState(false);
  const [totalStars,    setTotalStars]   = useState(s0?.totalStars   ?? 0);
  const [unlockedChars, setUnlockedChars]= useState(s0?.unlockedChars ?? [0]);
  const [newUnlock,     setNewUnlock]    = useState(null);
  const [shop,          setShop]         = useState(false);
  const [soundOn,       setSoundOn]      = useState(s0?.soundOn      ?? true);
  const [hapticOn,      setHapticOn]     = useState(s0?.hapticOn     ?? true);
  const [lang,          setLang]         = useState(s0?.lang         ?? "fr");
  const [showSettings,  setShowSettings] = useState(false);

  // helpers that respect user prefs
  const sfx = useCallback((name) => { if (soundOn) { try { getAudioCtx().resume?.(); } catch(e) {} SFX[name]?.(); } }, [soundOn]);
  const hap = useCallback((name) => { if (hapticOn) HAP[name]?.(); }, [hapticOn]);

  // Save to localStorage whenever key state changes
  useEffect(() => {
    writeSave({ level, tables, unlocked, heroIdx, totalStars, unlockedChars, soundOn, hapticOn, lang });
  }, [level, tables, unlocked, heroIdx, totalStars, unlockedChars, soundOn, hapticOn, lang]);

  const planet    = getPlanetForLevel(level);
  const charObj   = CHARACTERS[heroIdx];
  const useTabs   = tables.filter(t => unlocked.includes(t));
  const activeTabs = useTabs.length > 0 ? useTabs : [1];

  const toggleTable = (n) => {
    if (!unlocked.includes(n)) { setShop(true); return; }
    setTables(prev => prev.includes(n) ? (prev.length > 1 ? prev.filter(x => x !== n) : prev) : [...prev, n]);
  };

  const handleRunFinish = useCallback(() => {
    setQuestion(makeQuestion(activeTabs));
    setScreen("quiz");
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [level, activeTabs.join(",")]);

  const handleAnswer = (ok) => {
    setCorrect(ok);
    if (ok) {
      sfx("correct");
      setTotalStars(prev => {
        const next = prev + 1;
        setNewUnlock(null);
        return next;
      });
      setTimeout(() => { sfx("levelUp"); setScreen("done"); }, 950);
    } else {
      sfx("wrong");
      setNewUnlock(null);
      setTimeout(() => setScreen("run"), 950);
    }
  };

  const handleSkipDone = (bothCorrect) => {
    if (!bothCorrect) {
      sfx("wrong");
      setScreen("run");
      return;
    }
    sfx("correct");
    setNewUnlock(null);
    setCorrect(true);
    setTotalStars(prev => {
      const next = prev + 1;

      return next;
    });
    setTimeout(() => sfx("levelUp"), 200);
    setScreen("done");
  };

  const handleReset = () => {
    const passOwned = unlocked.length >= 9; // pass was bought if all tables unlocked
    setLevel(1);
    setTotalStars(0);
    setUnlockedChars([0]);
    setHeroIdx(0);
    setTables([1, 2]);
    if (!passOwned) setUnlocked([1, 2, 3]);
    setScreen("home");
  };

  const handleNext = () => {
    if (correct) {
      setLevel(l => (l < TOTAL_LEVELS ? l + 1 : 1));
    }
    setNewUnlock(null);
    setQuestion(null);
    setScreen("run");
  };

  // game screen uses landscape layout
  const isGame = screen === "run";

  return (
    <div style={{
      minHeight:"100vh", background:planet.bg,
      fontFamily:"'Nunito', sans-serif",
      display:"flex", flexDirection:"column", alignItems:"center",
      position:"relative", overflowX:"hidden",
    }}>
      <style>{`
        @keyframes twinkle  { from{opacity:.3;transform:scale(.8)} to{opacity:1;transform:scale(1.3)} }
        @keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
        @keyframes pulse    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
        @keyframes spin     { from{transform:rotate(0deg) scale(.4);opacity:0} to{transform:rotate(360deg) scale(1);opacity:1} }
        @keyframes bounceIn { from{transform:scale(.4);opacity:0} to{transform:scale(1);opacity:1} }
        @keyframes slideUp  { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
        button:active { filter: brightness(0.85); }
      `}</style>

      <Stars color={planet.stars} />

      {/* ── GAME SCREEN (landscape, full width) ── */}
      {isGame && (
        <div style={{ position:"relative", zIndex:10, width:"100%", maxWidth:960, padding:"10px 12px 80px", animation:"slideUp .3s ease" }}>
          {/* game header */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
            <button onClick={() => setScreen("home")} style={{ background:"#ffffff22", border:"none", borderRadius:20, padding:"5px 14px", color:"#fff", cursor:"pointer", fontSize:15 }}>
              {"<"} Accueil
            </button>
            <div style={{ fontSize:16, fontWeight:900, color:planet.color, textShadow:`0 0 10px ${planet.color}` }}>
              {planet.name} — Niveau {level}
            </div>
            <div style={{ color:"#FFD700", fontSize:14, fontWeight:700 }}>{"\u2B50"} {totalStars}</div>
          </div>

          <div style={{ background:"#ffffff0d", borderRadius:18, padding:12, border:`1px solid ${planet.color}33` }}>
            {(() => {
              const d = getDifficulty(level);
              const label = getDifficultyLabel(level, lang);
              const labelColor = level <= 10 ? "#00C853" : level <= 25 ? "#FFD700" : level <= 50 ? "#FF8A65" : level <= 75 ? "#FF5252" : "#FF1744";
              return (
                <div style={{ display:"flex", gap:12, alignItems:"center", marginBottom:8, fontSize:12, color:"#ffffff88", flexWrap:"wrap" }}>
                  <span style={{ color:labelColor, fontWeight:900, fontSize:13 }}>{label}</span>
                  <span>{tr("speedLabel", lang)} : {d.speed.toFixed(1)}</span>
                  <span>{tr("obstaclesLabel", lang)} : {d.obsCount}</span>
                  <span>{tr("flyingLabel", lang)} : {Math.round(d.flyRatio * 100)}%</span>
                </div>
              );
            })()}
            <Runner
            key={`run-${level}-${heroIdx}`}
            planet={planet}
            charObj={charObj}
            level={level}
            onFinish={handleRunFinish}
            sfx={sfx}
            hap={hap}
            lang={lang}
            isLandscapeMobile={mobileLandscape}
            vp={vp}
          />
          </div>

          <div style={{ textAlign:"center", marginTop:8, fontSize:13, color:"#ffffff55" }}>
            {tr("jumpHint",lang)} | {tr("duckHint",lang)}
          </div>

          {/* Skip button */}
          <div style={{ textAlign:"center", marginTop:10 }}>
            <button onClick={() => setScreen("skip")} style={{
              padding:"8px 22px", fontSize:13, fontWeight:700,
              background:"#ffffff11", border:"1px solid #ffffff33",
              borderRadius:50, color:"#ffffff88", cursor:"pointer",
            }}>
              {tr("skipBtn",lang)}
            </button>
          </div>
        </div>
      )}

      {/* ── SKIP MODAL (overlay above game) ── */}
      {screen === "skip" && (
        <div style={{ position:"fixed", inset:0, zIndex:150, background:"#000000bb", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div style={{ background:"linear-gradient(135deg,#1a0a3e,#0d1a4e)", border:`2px solid ${planet.color}`, borderRadius:20, padding:24, width:"100%", maxWidth:360, boxShadow:`0 0 40px ${planet.color}44`, animation:"slideUp .25s ease" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
              <div style={{ fontSize:16, fontWeight:900, color:planet.color }}>{tr("skipTitle",lang)} {level}</div>
              <button onClick={() => setScreen("run")} style={{ background:"#ffffff22", border:"none", borderRadius:50, width:30, height:30, color:"#fff", fontSize:16, cursor:"pointer", lineHeight:"30px" }}>✕</button>
            </div>
            <SkipQuiz tables={activeTabs} planet={planet} onDone={handleSkipDone} lang={lang} />
          </div>
        </div>
      )}

      {/* ── ALL OTHER SCREENS (portrait, centered) ── */}
      {!isGame && (
        <div style={{
          position:"relative", zIndex:10, width:"100%",
          maxWidth: mobileLandscape ? "100%" : (isMobile ? "100%" : 420),
          flex:1, paddingBottom: mobileLandscape ? 46 : 70, animation:"slideUp .3s ease"
        }}>
          {/* header */}
          <div style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            padding: mobileLandscape ? "8px 12px 6px" : "14px 16px 6px"
          }}>
            {screen !== "home"
              ? <button onClick={() => setScreen("home")} style={{ background:"#ffffff22", border:"none", borderRadius:20, padding:"5px 12px", color:"#fff", cursor:"pointer", fontSize:15 }}>{"<"} Accueil</button>
              : <div />}
            <div style={{ fontSize:18, fontWeight:900, color:planet.color, textShadow:`0 0 12px ${planet.color}` }}>MultiPlanet</div>
            <div style={{ color:"#FFD700", fontSize:13, fontWeight:700 }}>{"\u2B50"} {totalStars}</div>
          </div>

          <div style={{ padding:"0 14px" }}>

            {/* HOME */}
            {screen === "home" && (
              <div style={{
                display:"grid",
                gridTemplateColumns: mobileLandscape ? "minmax(260px, 34%) 1fr" : "1fr",
                gap: mobileLandscape ? 12 : 0,
                alignItems:"stretch"
              }}>
                <div className="mp-card" style={{
                  padding: mobileLandscape ? 14 : 12,
                  textAlign:"center",
                  border:`1px solid ${planet.color}33`
                }}>
                  <div style={{ margin:"8px 0 4px", animation:"float 3s ease-in-out infinite" }}>
                    <AvatarBadge charObj={charObj} size={mobileLandscape ? 132 : 120} animated />
                  </div>
                  <div style={{ fontSize: mobileLandscape ? 30 : 28, fontWeight:900, color:"#fff", textShadow:`0 0 18px ${planet.color}`, marginBottom:2 }}>MultiPlanet</div>
                  <div style={{ fontSize:13, color:"#ffffff77", marginBottom:14 }}>{tr("appSubtitle",lang)}</div>

                  <div style={{ display:"flex", gap:8, justifyContent:"center", alignItems:"center", marginBottom:14 }}>
                    <span style={{ color:"#ffffff66", fontSize:13 }}>{tr("levelWord",lang)} :</span>
                    <span style={{ color:planet.color, fontSize:16, fontWeight:900, background:`${planet.color}22`, borderRadius:10, padding:"2px 10px" }}>{level} / {TOTAL_LEVELS}</span>
                  </div>

                  <div style={{ display:"grid", gridTemplateColumns: mobileLandscape ? "1fr" : "repeat(3,auto)", gap:10, justifyContent:"center" }}>
                    <button onClick={() => setScreen("run")} style={{ padding: mobileLandscape ? "16px 24px" : "15px 36px", fontSize: mobileLandscape ? 20 : 19, fontWeight:900, border:"none", borderRadius:50, background:`linear-gradient(135deg,${planet.color},${planet.color}88)`, color:"#1a0a3e", cursor:"pointer", boxShadow:`0 4px 20px ${planet.color}55` }}>{tr("play",lang)}</button>
                    <button onClick={() => setShop(true)} style={{ padding:"14px 18px", fontSize:15, fontWeight:700, border:`2px solid #FFD700`, borderRadius:50, background:"#FFD70011", color:"#FFD700", cursor:"pointer" }}>{tr("shop",lang)}</button>
                    <button onClick={() => setShowSettings(true)} style={{ padding:"14px 18px", fontSize:17, fontWeight:700, border:"2px solid #ffffff33", borderRadius:50, background:"#ffffff11", color:"#ffffff99", cursor:"pointer" }}>{"\u2699\uFE0F"}</button>
                  </div>

                  <div style={{ marginTop:14, padding:"8px 12px", borderRadius:10, background:"#ffffff08", border:"1px solid #ffffff11", fontSize:11, color:"#ffffff44", lineHeight:1.6 }}>
                    {tr("coppa",lang)}
                  </div>
                </div>

                <div style={{ display:"grid", gridTemplateRows: "auto auto", gap:12 }}>
                  <div className="mp-card" style={{ padding:12, border:`1px solid ${planet.color}33` }}>
                    <div style={{ fontSize:13, color:"#ffffff77", marginBottom:8, textAlign:"center" }}>{tr("myHero",lang)}</div>
                    <div style={{ display:"grid", gridTemplateColumns: mobileLandscape ? "repeat(4, minmax(0,1fr))" : "repeat(4, 1fr)", gap:8 }}>
                      {CHARACTERS.map((c, i) => {
                        const isUnlocked = unlockedChars.includes(i);
                        const isSelected = heroIdx === i;
                        const cost = i === 0 ? 0 : CHAR_UNLOCK_COST;
                        const canAfford = totalStars >= cost;
                        return (
                          <button key={i} onClick={() => {
                            if (isUnlocked) { setHeroIdx(i); }
                            else if (canAfford) {
                              setTotalStars(s => s - cost);
                              setUnlockedChars(u => [...u, i]);
                              setNewUnlock(c);
                              sfx("unlock");
                              setHeroIdx(i);
                            }
                          }} style={{
                            background: isSelected ? `${c.color}44` : isUnlocked ? "#ffffff11" : "#ffffff08",
                            border:`2px solid ${isSelected ? c.color : isUnlocked ? "#ffffff22" : "#ffffff11"}`,
                            borderRadius:12, padding:"8px 6px", cursor: isUnlocked || canAfford ? "pointer" : "not-allowed",
                            display:"flex", flexDirection:"column", alignItems:"center", gap:4, minHeight:80,
                            position:"relative", opacity: !isUnlocked && !canAfford ? 0.5 : 1,
                          }}>
                            <span style={{ filter: isUnlocked ? "none" : "grayscale(0.25)", opacity:isUnlocked?1:0.8 }}><AvatarBadge charObj={c} size={42} /></span>
                            {isUnlocked ? (
                              <span style={{ fontSize:10, color: isSelected ? c.color : "#ffffff66", fontWeight:700 }}>{c.label}</span>
                            ) : (
                              <span style={{ fontSize:10, color: canAfford ? "#FFD700" : "#ffffff44", fontWeight:700 }}>{CHAR_UNLOCK_COST}{"\u2B50"}</span>
                            )}
                            {!isUnlocked && <span style={{ position:"absolute", top:3, right:5, fontSize:11 }}>{canAfford ? "\u{1F513}" : "\u{1F512}"}</span>}
                          </button>
                        );
                      })}
                    </div>
                    <div style={{ marginTop:8, fontSize:11, color:"#ffffff55", textAlign:"center" }}>{tr("heroShopHint",lang)}</div>
                    {unlockedChars.length < CHARACTERS.length && (
                      <div style={{ marginTop:4, fontSize:11, color:"#ffffff55", textAlign:"center" }}>{tr("unlockHero",lang)}</div>
                    )}
                  </div>

                  <div className="mp-card" style={{ padding:14, border:`1px solid ${planet.color}33` }}>
                    <TablePicker selected={tables} unlocked={unlocked} onToggle={toggleTable} lang={lang} />
                  </div>
                </div>
              </div>
            )}

            {/* QUIZ */}
            {screen === "quiz" && question && (
              <div className="mp-card" style={{ padding:16, border:`1px solid ${planet.color}33`, maxWidth: mobileLandscape ? 900 : "none", margin: mobileLandscape ? "0 auto" : "0" }}>
                <div style={{ textAlign:"center", marginBottom:10, fontSize:15, color:planet.color, fontWeight:700 }}>{tr("quizTitle",lang)} {level}</div>
                <Question key={`q-${level}`} question={question} planet={planet} onResult={handleAnswer} lang={lang} />
              </div>
            )}

            {/* DONE */}
            {screen === "done" && (
              <div className="mp-card" style={{ padding:16, border:`1px solid ${planet.color}33`, maxWidth: mobileLandscape ? 900 : "none", margin: mobileLandscape ? "0 auto" : "0" }}>
                <LevelDone level={level} correct={correct} totalStars={totalStars} newUnlock={newUnlock} onNext={handleNext} lang={lang} unlockedChars={unlockedChars} />
              </div>
            )}
          </div>
        </div>
      )}

      {/* Ad banner */}
      <div style={{ position:"fixed", bottom:0, left:0, right:0, height: mobileLandscape ? 38 : 56, zIndex:100, background:"#0a0520f0", borderTop:"1px solid #ffffff18", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div style={{ background:"#ffffff0d", border:"1px solid #ffffff1a", borderRadius:8, padding: mobileLandscape ? "4px 16px" : "5px 22px", fontSize: mobileLandscape ? 11 : 12, color:"#ffffff44", display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:16 }}>{"\u{1F4E3}"}</span>
          {tr("adSafe", lang)}
        </div>
      </div>

      {shop && <Shop lang={lang} alreadyBought={unlocked.length === 9} onClose={() => setShop(false)} onBuy={() => { setUnlocked([1,2,3,4,5,6,7,8,9]); setShop(false); }} />}
      {showSettings && <Settings soundOn={soundOn} setSoundOn={setSoundOn} hapticOn={hapticOn} setHapticOn={setHapticOn} lang={lang} setLang={setLang} onClose={() => setShowSettings(false)} onReset={handleReset} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
  <script>
    // Enregistrement du Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[MultiPlanet] SW enregistré:', reg.scope))
          .catch(err => console.warn('[MultiPlanet] SW échec:', err));
      });
    }
  </script>
</body>
</html>
